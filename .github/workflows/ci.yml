name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python scripts
        run: python -m compileall -q plugins tests scripts
      - name: Run workbench tests
        run: python -m unittest discover -s tests -v
      - name: Validate public release
        run: python scripts/validate_release.py
